name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Fyne build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev
      - run: go vet -tags migrated_fynedo ./...
      - run: go test -race -tags migrated_fynedo ./...

  windows-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Windows cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
      - name: Compile Windows tests
        env:
          CC: x86_64-w64-mingw32-gcc
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
        run: go test -tags migrated_fynedo -exec=true ./...

  macos-smoke:
    # macOS is not a supported release target yet. Keep this diagnostic until
    # the native suite and manual GUI checks have been proven stable.
    continue-on-error: true
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run native macOS smoke tests
        env:
          CGO_ENABLED: "1"
        run: go test -tags migrated_fynedo ./...
